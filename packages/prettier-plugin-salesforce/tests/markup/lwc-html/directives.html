<template><template for:each={ rows } for:item="row" for:index="index"><lightning-icon icon-name="utility:user" size="x-small"/><section key={ row.Id } if:true={ row.visible } lwc:if={ showRows } onclick={ handleRowClick } onkeydown={ handleRowKeydown }>{ row.Name }</section><lightning-badge label={ row.Badge }/></template><template if:true={  hasGroups  }><template for:each={  groupedRows [ groupKey ]  } for:item="groupRow"><div key={  groupRow.Id  }><template lwc:if={  shouldShowRow( groupRow )  }><button onclick={  handlePick( groupRow.Id )  }>{  groupRow.Label  }</button></template></div></template></template></template>
